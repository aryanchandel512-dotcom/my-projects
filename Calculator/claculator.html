<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style5.css">

</head>

<body>
    <fieldset>

        <div class="calculator">
            <input type="text" id="display" readonly>
            <div class="buttons">
                <button onclick="clearDisplay()" class="clear">C</button>
                <button onclick="inputType('/')" class="operator">/</button>
                <button onclick="inputType('-')" class="operator">-</button>
                <button onclick="inputType('+')" class="operator">+</button>
                <button onclick="inputType('*')" class="operator">*</button>
                <button onclick="calculate()" class="equal">=</button>

                <button onclick="inputType('1')">1</button>
                <button onclick="inputType('2')">2</button>
                <button onclick="inputType('3')">3</button>
                <button onclick="inputType('4')">4</button>
                <button onclick="inputType('5')">5</button>
                <button onclick="inputType('6')">6</button>
                <button onclick="inputType('7')">7</button>
                <button onclick="inputType('8')">8</button>
                <button onclick="inputType('9')">9</button>
                <button onclick="inputType('0')">0</button>
                <button onclick="inputType('00')">00</button>
                <button onclick="inputType('.')">.</button>
                <button onclick="deleteLast()">DEL</button>
            </div>
        </div>
    </fieldset>
    <script src="71.js"></script>
</body>
</html>
