<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor</title>
    <link rel="stylesheet" href="stonepapercissor.css">
</head>

<body>

    <h1>Rock Paper Scissor</h1>

    <div class="choices">

        <div class="choice" id="rock">
            <img src="rock2.png">
        </div>

        <div class="choice" id="paper">
            <img src="paper.png">
        </div>

        <div class="choice" id="scissor">
            <img src="images.jpg">
        </div>

    </div>

    <div class="score-board">

        <div class="score">
            <p id="user-score">0</p>
            <p>YOU</p>
        </div>

        <div class="score">
            <p id="com-score">0</p>
            <p>COM</p>
        </div>

    </div>

    <div class="msg-container">
        <p id="msg">PLAY YOUR MOVE NOW</p>
    </div>

    <script src="stonepapercissor.js"></script>

</body>

</html>
